name: CI/CD Pipeline — Cart App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Run Tests
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🧪 Run Jest Tests with Coverage
        working-directory: ./backend
        run: npm test -- --testPathPattern=../tests

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/

  # ──────────────────────────────────────────────
  # JOB 2: Build Docker Images
  # ──────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Backend Image
        run: docker build -t cart-backend:${{ github.sha }} ./backend

      - name: 🔨 Build Frontend Image
        run: docker build -t cart-frontend:${{ github.sha }} ./frontend

      - name: ✅ Verify Images Built
        run: docker images | grep cart

  # ──────────────────────────────────────────────
  # JOB 3: Integration Test with Docker Compose
  # ──────────────────────────────────────────────
  integration:
    name: 🔗 Integration Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Start Services
        run: docker compose up -d --build

      - name: ⏳ Wait for Backend Health
        run: |
          echo "Waiting for backend..."
          for i in {1..20}; do
            if curl -sf http://localhost:5000/health; then
              echo "✅ Backend is up!"
              break
            fi
            echo "Attempt $i/20..."
            sleep 3
          done

      - name: 🔗 Test API Endpoints
        run: |
          echo "=== Testing Health ==="
          curl -sf http://localhost:5000/health

          echo "=== Testing Products ==="
          curl -sf http://localhost:5000/api/products | python3 -m json.tool

          echo "=== Testing Add to Cart ==="
          curl -sf -X POST http://localhost:5000/api/cart \
            -H "Content-Type: application/json" \
            -d '{"productId": 1}' | python3 -m json.tool

          echo "=== Testing Get Cart ==="
          curl -sf http://localhost:5000/api/cart | python3 -m json.tool

          echo "✅ All integration tests passed!"

      - name: 🔍 Test Frontend is Serving
        run: curl -sf http://localhost:3000 | grep -q "ShopCart" && echo "✅ Frontend OK"

      - name: 🪵 Print Logs on Failure
        if: failure()
        run: docker compose logs

      - name: 🛑 Stop Services
        if: always()
        run: docker compose down
