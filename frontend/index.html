<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCart — SE Assignment</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --border: #2a2a2a;
      --accent: #f0c060;
      --accent2: #e07040;
      --text: #f0ede8;
      --muted: #888;
      --green: #4caf7a;
      --red: #e05050;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 70px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .cart-badge-btn {
      position: relative; cursor: pointer;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 50px; padding: 10px 20px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
      transition: all 0.2s; user-select: none;
    }
    .cart-badge-btn:hover { border-color: var(--accent); }
    .cart-icon { font-size: 1.1rem; }
    #cart-count {
      background: var(--accent); color: #000;
      font-size: 0.7rem; font-weight: 700;
      border-radius: 50px; padding: 2px 8px;
      min-width: 22px; text-align: center;
    }

    /* ── Layout ── */
    .container { max-width: 1300px; margin: 0 auto; padding: 0 40px; }

    /* ── Section titles ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; font-weight: 700;
      margin: 48px 0 8px;
    }
    .section-sub { color: var(--muted); margin-bottom: 32px; }

    /* ── Products Grid ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(240,192,96,0.12);
    }

    .product-emoji { font-size: 3.5rem; }

    .product-category {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent); font-weight: 500;
    }

    .product-name {
      font-size: 0.95rem; font-weight: 500; text-align: center;
      line-height: 1.4;
    }

    .product-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--accent);
    }

    .btn-add {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #000; font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 0.88rem; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.97); }
    .btn-add.added {
      background: var(--green); color: #fff;
      animation: pulse 0.3s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* ── Cart Sidebar ── */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }

    .cart-sidebar {
      position: fixed; right: -420px; top: 0; bottom: 0;
      width: 420px; background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 201; transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
      box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    }
    .cart-sidebar.open { right: 0; }

    .cart-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-header h2 {
      font-family: 'Playfair Display', serif; font-size: 1.4rem;
    }
    .close-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .close-btn:hover { background: var(--border); }

    .cart-items {
      flex: 1; overflow-y: auto; padding: 20px 28px;
    }
    .cart-items::-webkit-scrollbar { width: 4px; }
    .cart-items::-webkit-scrollbar-track { background: transparent; }
    .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-cart {
      text-align: center; padding: 60px 0; color: var(--muted);
    }
    .empty-cart .empty-icon { font-size: 3rem; margin-bottom: 16px; }

    .cart-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 12px;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .item-emoji { font-size: 2rem; }

    .item-details { flex: 1; }
    .item-name { font-size: 0.88rem; font-weight: 500; }
    .item-price { font-size: 0.8rem; color: var(--accent); margin-top: 2px; }

    .qty-ctrl {
      display: flex; align-items: center; gap: 8px;
    }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .qty-btn:hover { border-color: var(--accent); }
    .qty-num { font-size: 0.9rem; font-weight: 600; min-width: 20px; text-align: center; }

    .remove-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 4px;
      transition: color 0.2s;
    }
    .remove-btn:hover { color: var(--red); }

    .cart-footer {
      padding: 20px 28px 28px;
      border-top: 1px solid var(--border);
    }
    .cart-total-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .total-label { color: var(--muted); font-size: 0.9rem; }
    .total-amount {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700; color: var(--accent);
    }

    .btn-checkout {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      color: #000; font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 10px;
    }
    .btn-checkout:hover { opacity: 0.88; }
    .btn-checkout:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-clear {
      width: 100%; padding: 10px;
      background: none; border: 1px solid var(--border);
      border-radius: 12px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }
    .btn-clear:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card); border: 1px solid var(--accent);
      color: var(--text); padding: 12px 24px; border-radius: 50px;
      font-size: 0.9rem; z-index: 999;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    footer {
      margin-top: 80px; padding: 24px 40px;
      border-top: 1px solid var(--border);
      text-align: center; color: var(--muted); font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .container { padding: 0 20px; }
      .cart-sidebar { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ShopCart</div>
  <button class="cart-badge-btn" onclick="openCart()">
    <span class="cart-icon">🛒</span>
    My Cart
    <span id="cart-count">0</span>
  </button>
</header>

<main class="container">
  <h1 class="section-title">Our Products</h1>
  <p class="section-sub">Discover curated picks — add what you love.</p>
  <div class="products-grid" id="products-grid">
    <p style="color:var(--muted)">Loading products…</p>
  </div>
</main>

<!-- Cart Overlay & Sidebar -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<aside class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h2>🛒 Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="total-label">Total</span>
      <span class="total-amount" id="cart-total">₹0</span>
    </div>
    <button class="btn-checkout" id="btn-checkout" onclick="checkout()" disabled>
      Proceed to Checkout →
    </button>
    <button class="btn-clear" id="btn-clear" onclick="clearCart()" disabled>
      Clear Cart
    </button>
  </div>
</aside>

<!-- Toast -->
<div class="toast" id="toast"></div>

<footer>
  Software Engineering Assignment · Add to Cart Application · Built with Node.js, Docker & GitHub Actions
</footer>

<script>
  const API = 'http://localhost:5000/api';

  async function fetchProducts() {
    try {
      const res = await fetch(`${API}/products`);
      const { products } = await res.json();
      renderProducts(products);
    } catch {
      document.getElementById('products-grid').innerHTML =
        '<p style="color:var(--red)">⚠️ Cannot connect to backend. Make sure Docker is running.</p>';
    }
  }

  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = products.map(p => `
      <div class="product-card" id="card-${p.id}">
        <div class="product-emoji">${p.image}</div>
        <span class="product-category">${p.category}</span>
        <span class="product-name">${p.name}</span>
        <span class="product-price">₹${p.price.toLocaleString('en-IN')}</span>
        <button class="btn-add" onclick="addToCart(${p.id}, this)">Add to Cart</button>
      </div>
    `).join('');
  }

  async function addToCart(productId, btn) {
    btn.textContent = '✓ Added!';
    btn.classList.add('added');
    setTimeout(() => {
      btn.textContent = 'Add to Cart';
      btn.classList.remove('added');
    }, 1500);

    try {
      await fetch(`${API}/cart`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId })
      });
      await refreshCart();
      showToast('Item added to cart 🛒');
    } catch { showToast('Error adding item ❌'); }
  }

  async function refreshCart() {
    try {
      const res = await fetch(`${API}/cart`);
      const { cart, total, count } = await res.json();
      document.getElementById('cart-count').textContent = count;
      document.getElementById('cart-total').textContent = `₹${total.toLocaleString('en-IN')}`;
      document.getElementById('btn-checkout').disabled = cart.length === 0;
      document.getElementById('btn-clear').disabled = cart.length === 0;
      renderCartItems(cart);
    } catch {}
  }

  function renderCartItems(cart) {
    const list = document.getElementById('cart-items-list');
    if (!cart.length) {
      list.innerHTML = `<div class="empty-cart"><div class="empty-icon">🛍️</div><p>Your cart is empty.<br>Add some products!</p></div>`;
      return;
    }
    list.innerHTML = cart.map(item => `
      <div class="cart-item" id="item-${item.id}">
        <span class="item-emoji">${item.image}</span>
        <div class="item-details">
          <div class="item-name">${item.name}</div>
          <div class="item-price">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
          <span class="qty-num">${item.quantity}</span>
          <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
        </div>
        <button class="remove-btn" onclick="removeItem(${item.id})">🗑</button>
      </div>
    `).join('');
  }

  async function updateQty(id, qty) {
    await fetch(`${API}/cart/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quantity: qty })
    });
    await refreshCart();
  }

  async function removeItem(id) {
    await fetch(`${API}/cart/${id}`, { method: 'DELETE' });
    await refreshCart();
    showToast('Item removed');
  }

  async function clearCart() {
    await fetch(`${API}/cart`, { method: 'DELETE' });
    await refreshCart();
    showToast('Cart cleared');
  }

  function checkout() {
    showToast('Order placed! 🎉 Thank you for shopping.');
    fetch(`${API}/cart`, { method: 'DELETE' }).then(() => refreshCart());
    closeCart();
  }

  function openCart() {
    document.getElementById('cart-sidebar').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');
    refreshCart();
  }

  function closeCart() {
    document.getElementById('cart-sidebar').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  fetchProducts();
  refreshCart();
</script>
</body>
</html>
